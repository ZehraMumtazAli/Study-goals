<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>study.goals</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f0eb;
  --surface: #fffdf9;
  --surface2: #f0ebe3;
  --border: #e0d8ce;
  --accent: #5c47d6;
  --accent2: #c026a8;
  --green: #0d9e6e;
  --yellow: #c47f00;
  --red: #d93a55;
  --text: #1e1a2e;
  --muted: #8a7f99;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(92,71,214,0.07) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  z-index: 0;
}

.orb {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
.orb1 {
  width: 550px; height: 550px;
  background: radial-gradient(circle, rgba(252,220,180,0.55) 0%, transparent 65%);
  top: -160px; right: -100px;
}
.orb2 {
  width: 380px; height: 380px;
  background: radial-gradient(circle, rgba(190,210,255,0.40) 0%, transparent 65%);
  bottom: 40px; left: -70px;
}

.app {
  max-width: 880px;
  margin: 0 auto;
  padding: 36px 20px 80px;
  position: relative;
  z-index: 1;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 32px;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.5rem, 5vw, 2rem);
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo-dot {
  -webkit-text-fill-color: var(--green);
  color: var(--green);
}

.logo-sub {
  font-size: 0.65rem;
  color: var(--muted);
  margin-top: 2px;
}

.date-chip {
  font-size: 0.7rem;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 20px;
  white-space: nowrap;
}

/* STATS */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 22px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 18px 16px;
  border-radius: 16px;
}

.stat-label {
  font-size: 0.62rem;
  color: var(--muted);
  margin-bottom: 4px;
}

.stat-value {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.3rem, 4vw, 2rem);
  font-weight: 800;
}

.c-purple { color: var(--accent); }
.c-green  { color: var(--green); }
.c-yellow { color: var(--yellow); }

/* PROGRESS RING */
.progress-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 22px 24px;
  display: flex;
  align-items: center;
  gap: 22px;
  margin-bottom: 22px;
  flex-wrap: wrap;
}

.ring-wrap {
  position: relative;
  flex-shrink: 0;
}

.ring-wrap svg {
  display: block;
  transform: rotate(-90deg);
}

.ring-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  color: var(--accent);
}

.progress-msg {
  color: var(--muted);
  font-size: 0.85rem;
  line-height: 1.6;
}

/* ADD FORM */
.add-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 18px 20px;
  margin-bottom: 20px;
}

.add-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.add-row input {
  flex: 1 1 180px;
  min-width: 0;
  padding: 11px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  font-family: inherit;
  font-size: 0.85rem;
  background: var(--surface2);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

.add-row input:focus {
  border-color: var(--accent);
}

.add-row select {
  padding: 11px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  font-family: inherit;
  font-size: 0.85rem;
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  outline: none;
}

.add-row select:focus {
  border-color: var(--accent);
}

.btn-add {
  padding: 11px 22px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  cursor: pointer;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  white-space: nowrap;
  transition: opacity 0.2s;
}

.btn-add:hover { opacity: 0.88; }
.btn-add:active { opacity: 0.75; }

/* FILTERS */
.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  cursor: pointer;
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 0.72rem;
  transition: all 0.15s;
}

.filter-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

/* GOALS */
.goals-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 0.85rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
}

.goal-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 15px 18px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: opacity 0.2s;
}

.goal-item.done {
  opacity: 0.55;
}

.goal-item input[type=checkbox] {
  width: 18px;
  height: 18px;
  cursor: pointer;
  flex-shrink: 0;
  accent-color: var(--accent);
}

.goal-body {
  flex: 1;
  min-width: 0;
}

.goal-title {
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 0.95rem;
  word-break: break-word;
}

.goal-item.done .goal-title {
  text-decoration: line-through;
}

.type-badge {
  font-size: 0.62rem;
  padding: 3px 10px;
  border-radius: 20px;
  flex-shrink: 0;
  white-space: nowrap;
}

.badge-daily   { background: rgba(92,71,214,0.1);  color: #5c47d6; border: 1px solid rgba(92,71,214,0.25); }
.badge-weekly  { background: rgba(192,38,168,0.1); color: #c026a8; border: 1px solid rgba(192,38,168,0.25);}
.badge-monthly { background: rgba(13,158,110,0.1); color: #0d9e6e; border: 1px solid rgba(13,158,110,0.25);}

.del-btn {
  border: none;
  background: none;
  cursor: pointer;
  color: var(--red);
  font-size: 0.95rem;
  flex-shrink: 0;
  padding: 4px 6px;
  border-radius: 6px;
  line-height: 1;
  transition: background 0.15s;
}

.del-btn:hover { background: rgba(217,58,85,0.1); }

/* MOBILE */
@media (max-width: 520px) {
  .stats-bar { grid-template-columns: 1fr 1fr; }
  .stat-card:last-child { grid-column: 1 / -1; }
  .progress-card { flex-direction: column; text-align: center; }
  .add-row { flex-direction: column; }
  .add-row input,
  .add-row select,
  .btn-add { width: 100%; }
}

</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="app">

  <!-- HEADER -->
  <header>
    <div>
      <div class="logo">study<span class="logo-dot">.</span>goals</div>
      <div class="logo-sub">academic command center</div>
    </div>
    <div class="date-chip" id="datechip"></div>
  </header>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Total Goals</div>
      <div class="stat-value c-purple" id="totalCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Completed</div>
      <div class="stat-value c-green" id="doneCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending</div>
      <div class="stat-value c-yellow" id="pendingCount">0</div>
    </div>
  </div>

  <!-- PROGRESS RING -->
  <div class="progress-card">
    <div class="ring-wrap">
      <svg width="90" height="90">
        <defs>
          <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#5c47d6"/>
            <stop offset="100%" stop-color="#c026a8"/>
          </linearGradient>
        </defs>
        <circle cx="45" cy="45" r="36" stroke="#e8e3f0" stroke-width="7" fill="none"/>
        <circle id="ringArc" cx="45" cy="45" r="36"
          stroke="url(#rg)" stroke-width="7" fill="none"
          stroke-dasharray="226.2" stroke-dashoffset="226.2"
          stroke-linecap="round"
          style="transition: stroke-dashoffset 0.5s ease;"/>
      </svg>
      <div class="ring-label" id="ringPct">0%</div>
    </div>
    <div class="progress-msg" id="progressMsg">Stay focused and crush your goals.</div>
  </div>

  <!-- ADD FORM -->
  <div class="add-card">
    <div class="add-row">
      <input type="text" id="goalInput" placeholder="Enter a new goal..." autocomplete="off"/>
      <select id="typeSelect">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
      </select>
      <button class="btn-add" id="addBtn">+ Add</button>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filter-row" id="filterRow">
    <button class="filter-btn active" data-filter="all">all</button>
    <button class="filter-btn" data-filter="pending">pending</button>
    <button class="filter-btn" data-filter="done">done</button>
    <button class="filter-btn" data-filter="daily">daily</button>
    <button class="filter-btn" data-filter="weekly">weekly</button>
    <button class="filter-btn" data-filter="monthly">monthly</button>
  </div>

  <!-- GOALS -->
  <div class="goals-list" id="goalsList"></div>

</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let goals = [];
let activeFilter = 'all';
const STORAGE_KEY = 'studygoals-v1';

// ─── Storage helpers (window.storage with in-memory fallback) ─────────────
async function loadGoals() {
  try {
    if (window.storage) {
      const res = await window.storage.get(STORAGE_KEY);
      if (res && res.value) {
        goals = JSON.parse(res.value);
      }
    }
  } catch(e) {}
  render();
}

async function saveGoals() {
  try {
    if (window.storage) {
      await window.storage.set(STORAGE_KEY, JSON.stringify(goals));
    }
  } catch(e) {}
}

// ─── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('datechip').textContent = new Date().toDateString();

// ─── Add Goal ─────────────────────────────────────────────────────────────────
function addGoal() {
  const input = document.getElementById('goalInput');
  const type  = document.getElementById('typeSelect').value;
  const title = input.value.trim();
  if (!title) {
    input.focus();
    return;
  }
  goals.unshift({ id: Date.now(), title, type, done: false });
  input.value = '';
  input.focus();
  saveGoals();
  render();
}

document.getElementById('addBtn').addEventListener('click', addGoal);
document.getElementById('goalInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addGoal();
});

// ─── Toggle / Delete ──────────────────────────────────────────────────────────
function toggle(id) {
  const g = goals.find(x => x.id === id);
  if (g) { g.done = !g.done; saveGoals(); render(); }
}

function del(id) {
  goals = goals.filter(x => x.id !== id);
  saveGoals();
  render();
}

// ─── Filters ──────────────────────────────────────────────────────────────────
document.getElementById('filterRow').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

function getFiltered() {
  if (activeFilter === 'all')     return goals;
  if (activeFilter === 'done')    return goals.filter(g => g.done);
  if (activeFilter === 'pending') return goals.filter(g => !g.done);
  return goals.filter(g => g.type === activeFilter);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  // Stats
  const total   = goals.length;
  const done    = goals.filter(g => g.done).length;
  const pending = total - done;
  const pct     = total ? Math.round(done / total * 100) : 0;

  document.getElementById('totalCount').textContent   = total;
  document.getElementById('doneCount').textContent    = done;
  document.getElementById('pendingCount').textContent = pending;
  document.getElementById('ringPct').textContent      = pct + '%';

  // Ring (r=36, circumference = 2πr ≈ 226.2)
  const circ = 2 * Math.PI * 36;
  document.getElementById('ringArc').style.strokeDashoffset = circ * (1 - pct / 100);

  // Message
  const msgs = {
    100: '🎉 All goals complete! Amazing work!',
    50:  'More than halfway — keep it up!',
    0:   'Stay focused and crush your goals.',
  };
  document.getElementById('progressMsg').textContent =
    pct === 100 ? msgs[100] : pct >= 50 ? msgs[50] : msgs[0];

  // Goals
  const filtered = getFiltered();
  const list = document.getElementById('goalsList');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">${
      goals.length === 0
        ? 'No goals yet — add one above!'
        : 'No goals match this filter.'
    }</div>`;
    return;
  }

  list.innerHTML = filtered.map(g => `
    <div class="goal-item${g.done ? ' done' : ''}">
      <input type="checkbox" ${g.done ? 'checked' : ''} onchange="toggle(${g.id})">
      <div class="goal-body">
        <div class="goal-title">${escHtml(g.title)}</div>
      </div>
      <span class="type-badge badge-${g.type}">${g.type}</span>
      <button class="del-btn" onclick="del(${g.id})" title="Delete">✕</button>
    </div>
  `).join('');
}

function escHtml(str) {
  return str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadGoals();
</script>
</body>
</html>
