<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyGoals — Your Academic Command Center</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #f5f0eb;
  --surface: #fffdf9;
  --surface2: #f0ebe3;
  --border: #e0d8ce;
  --accent: #5c47d6;
  --accent2: #c026a8;
  --green: #0d9e6e;
  --yellow: #c47f00;
  --red: #d93a55;
  --text: #1e1a2e;
  --muted: #8a7f99;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(92,71,214,0.07) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
}

.glow-orb {
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(252,220,180,0.55) 0%, transparent 65%);
  top: -180px;
  right: -120px;
}

.glow-orb2 {
  position: fixed;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(190,210,255,0.40) 0%, transparent 65%);
  bottom: 60px;
  left: -80px;
}

.app {
  max-width: 900px;
  margin: auto;
  padding: 40px 24px 80px;
}

header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 40px;
  gap: 10px;
  flex-wrap: wrap;
}

.logo {
  font-family: 'Syne';
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.logo span {
  color: var(--green);
  -webkit-text-fill-color: var(--green);
}

.date-chip {
  font-size: 0.7rem;
  color: var(--muted);
  background: var(--surface2);
  padding: 6px 12px;
  border-radius: 20px;
}

.stats-bar {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 16px;
  margin-bottom: 30px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 16px;
}

.stat-label {
  font-size: 0.65rem;
  color: var(--muted);
}

.stat-value {
  font-family: 'Syne';
  font-size: 2rem;
  font-weight: 800;
}

.green { color: var(--green); }
.yellow { color: var(--yellow); }
.purple { color: var(--accent); }

.progress-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 25px;
  display: flex;
  gap: 25px;
  margin-bottom: 30px;
  align-items: center;
}

.ring-wrap {
  position: relative;
}

.ring-wrap svg {
  transform: rotate(-90deg);
}

.ring-text {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.ring-pct {
  font-family: 'Syne';
  font-size: 1.5rem;
  font-weight: 800;
}

.add-section {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 25px;
}

.add-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

input, select {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  font-family: inherit;
  background: var(--surface2);
}

input {
  flex: 1;
  min-width: 180px;
}

.btn {
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  cursor: pointer;
  font-family: 'Syne';
  font-weight: 700;
}

.filter-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  cursor: pointer;
  background: var(--surface);
  font-family: inherit;
}

.filter-btn.active {
  background: var(--accent);
  color: white;
}

.goals-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.goal-item {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 18px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--surface);
  flex-wrap: wrap;
}

.goal-item.done {
  opacity: 0.6;
}

.goal-body {
  flex: 1;
  word-break: break-word;
}

.goal-title {
  font-family: 'Syne';
  font-weight: 600;
}

.delete-btn {
  border: none;
  background: none;
  cursor: pointer;
  color: var(--red);
  font-size: 1rem;
}

@media (max-width:768px){

  .app {
    padding: 20px 14px 60px;
  }

  header {
    flex-direction: column;
    align-items: flex-start;
  }

  .logo {
    font-size: 1.6rem;
  }

  .stats-bar {
    grid-template-columns: 1fr;
  }

  .stat-value {
    font-size: 1.5rem;
  }

  .progress-section {
    flex-direction: column;
    text-align: center;
  }

  .add-row {
    flex-direction: column;
  }

  input, select, .btn {
    width: 100%;
  }

  .filter-row {
    overflow-x: auto;
    flex-wrap: nowrap;
  }

  .goal-item {
    flex-direction: column;
    align-items: flex-start;
  }

  .delete-btn {
    align-self: flex-end;
  }

}

</style>
</head>

<body>

<div class="glow-orb"></div>
<div class="glow-orb2"></div>

<div class="app">

<header>

<div>
<div class="logo">study<span>.</span>goals</div>
<div style="font-size:0.7rem;color:gray">academic command center</div>
</div>

<div class="date-chip" id="datechip"></div>

</header>

<div class="stats-bar">

<div class="stat-card">
<div class="stat-label">Total Goals</div>
<div class="stat-value purple" id="totalCount">0</div>
</div>

<div class="stat-card">
<div class="stat-label">Completed</div>
<div class="stat-value green" id="doneCount">0</div>
</div>

<div class="stat-card">
<div class="stat-label">Pending</div>
<div class="stat-value yellow" id="pendingCount">0</div>
</div>

</div>

<div class="progress-section">

<div class="ring-wrap">

<svg width="100" height="100">

<circle cx="50" cy="50" r="40"
stroke="#eee"
stroke-width="8"
fill="none"/>

<circle id="ringProgress"
cx="50"
cy="50"
r="40"
stroke="url(#grad)"
stroke-width="8"
fill="none"
stroke-dasharray="251"
stroke-dashoffset="251"/>

</svg>

<div class="ring-text">
<div class="ring-pct" id="ringPct">0%</div>
</div>

</div>

<div>
Stay focused and complete your goals.
</div>

</div>

<div class="add-section">

<div class="add-row">

<input id="goalInput" placeholder="Enter goal">

<select id="typeSelect">
<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="monthly">Monthly</option>
</select>

<button class="btn" onclick="addGoal()">Add</button>

</div>

</div>

<div class="goals-list" id="goalsList"></div>

</div>

<script>

datechip.textContent =
new Date().toDateString();

let goals =
JSON.parse(localStorage.getItem("studyGoals")||"[]");

function save(){
localStorage.setItem("studyGoals",
JSON.stringify(goals));
}

function addGoal(){

let input =
document.getElementById("goalInput");

if(!input.value.trim()) return;

goals.unshift({
id:Date.now(),
title:input.value,
done:false
});

input.value="";

save();

render();

}

function toggle(id){

let g=goals.find(x=>x.id==id);

g.done=!g.done;

save();

render();

}

function del(id){

goals=
goals.filter(x=>x.id!=id);

save();

render();

}

function stats(){

let total=goals.length;

let done=
goals.filter(x=>x.done).length;

let pending=total-done;

let pct=
total?
Math.round(done/total*100):0;

totalCount.textContent=total;

doneCount.textContent=done;

pendingCount.textContent=pending;

ringPct.textContent=pct+"%";

ringProgress.style.strokeDashoffset=
251-(251*pct/100);

}

function render(){

stats();

goalsList.innerHTML=
goals.map(g=>

`<div class="goal-item ${g.done?"done":""}">

<input type="checkbox"
${g.done?"checked":""}
onclick="toggle(${g.id})">

<div class="goal-body">
<div class="goal-title">${g.title}</div>
</div>

<button class="delete-btn"
onclick="del(${g.id})">
✕
</button>

</div>`

).join("");

}

render();

</script>

</body>
</html>
