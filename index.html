<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyGoals — Your Academic Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0eb;
    --surface: #fffdf9;
    --surface2: #f0ebe3;
    --border: #e0d8ce;
    --accent: #5c47d6;
    --accent2: #c026a8;
    --green: #0d9e6e;
    --yellow: #c47f00;
    --red: #d93a55;
    --text: #1e1a2e;
    --muted: #8a7f99;
    --card-glow: rgba(92,71,214,0.10);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Soft paper texture + dot grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(92,71,214,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(252,220,180,0.55) 0%, transparent 65%);
    top: -180px;
    right: -120px;
    pointer-events: none;
    z-index: 0;
  }
  .glow-orb2 {
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(190,210,255,0.40) 0%, transparent 65%);
    bottom: 60px;
    left: -80px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.03em;
  }
  .logo span { color: var(--green); -webkit-text-fill-color: var(--green); }

  .date-chip {
    font-size: 0.7rem;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 40px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
    box-shadow: 0 2px 8px rgba(92,71,214,0.05);
  }
  .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(92,71,214,0.12); }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .stat-card:hover::before { opacity: 1; }

  .stat-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    line-height: 1;
  }
  .stat-value.green { color: var(--green); }
  .stat-value.purple { color: var(--accent); }
  .stat-value.yellow { color: var(--yellow); }

  /* Progress ring */
  .progress-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 32px;
    animation: fadeUp 0.6s 0.2s ease both;
    box-shadow: 0 2px 12px rgba(92,71,214,0.06);
  }

  .ring-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: #e8e0f0; stroke-width: 8; }
  .ring-progress {
    fill: none;
    stroke: url(#ringGrad);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .ring-pct {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.6rem;
    color: var(--text);
  }
  .ring-sub { font-size: 0.6rem; color: var(--muted); }

  .progress-info h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .progress-info p { color: var(--muted); font-size: 0.8rem; line-height: 1.6; }

  /* Add goal */
  .add-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s 0.3s ease both;
    box-shadow: 0 2px 12px rgba(92,71,214,0.06);
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    display: block;
    width: 16px;
    height: 2px;
    background: var(--accent);
  }

  .add-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  input[type="text"], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 12px 16px;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"] { flex: 1; min-width: 200px; }
  select { min-width: 140px; }
  input[type="text"]:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,92,252,0.15);
  }
  input::placeholder { color: var(--muted); }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.05em;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-primary:hover { box-shadow: 0 4px 20px rgba(124,92,252,0.4); transform: translateY(-1px); }

  /* Filters */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    animation: fadeUp 0.6s 0.35s ease both;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 2px 10px rgba(92,71,214,0.25);
  }

  /* Goals list */
  .goals-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  .goal-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    animation: slideIn 0.4s ease both;
    cursor: pointer;
    box-shadow: 0 1px 6px rgba(92,71,214,0.04);
  }
  .goal-item:hover {
    border-color: rgba(92,71,214,0.35);
    box-shadow: 0 4px 20px rgba(92,71,214,0.10);
    transform: translateX(4px);
  }
  .goal-item.done {
    opacity: 0.55;
    background: #f7faf8;
    border-color: rgba(13,158,110,0.2);
  }
  .goal-item.done .goal-title { text-decoration: line-through; color: var(--muted); }

  .check-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 0.85rem;
    color: transparent;
  }
  .check-btn:hover { border-color: var(--green); background: rgba(13,158,110,0.07); }
  .goal-item.done .check-btn {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }

  .goal-body { flex: 1; min-width: 0; }
  .goal-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .goal-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.62rem;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .tag.daily { background: rgba(92,71,214,0.12); color: var(--accent); }
  .tag.weekly { background: rgba(13,158,110,0.12); color: var(--green); }
  .tag.monthly { background: rgba(196,127,0,0.12); color: var(--yellow); }

  .priority-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .priority-dot.high { background: var(--red); }
  .priority-dot.medium { background: var(--yellow); }
  .priority-dot.low { background: var(--green); }

  .priority-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px 8px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  .delete-btn:hover { color: var(--red); background: rgba(255,69,105,0.1); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.8;
  }
  .empty-state .emoji { font-size: 3rem; display: block; margin-bottom: 12px; }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-16px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .stats-bar { grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat-value { font-size: 1.4rem; }
    .progress-section { flex-direction: column; text-align: center; }
    .add-row { flex-direction: column; }
    input[type="text"], select, .btn { width: 100%; }
  }
</style>
</head>
<body>
<div class="glow-orb"></div>
<div class="glow-orb2"></div>

<div class="app">
  <header>
    <div>
      <div class="logo">study<span>.</span>goals</div>
      <div style="font-size:0.72rem;color:var(--muted);margin-top:4px;">academic command center</div>
    </div>
    <div class="date-chip" id="datechip"></div>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Total Goals</div>
      <div class="stat-value purple" id="totalCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Completed</div>
      <div class="stat-value green" id="doneCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending</div>
      <div class="stat-value yellow" id="pendingCount">0</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="ring-wrap">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#5c47d6"/>
            <stop offset="100%" style="stop-color:#c026a8"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="50" cy="50" r="40"/>
        <circle class="ring-progress" id="ringProgress" cx="50" cy="50" r="40"
          stroke-dasharray="251.2"
          stroke-dashoffset="251.2"/>
      </svg>
      <div class="ring-text">
        <span class="ring-pct" id="ringPct">0%</span>
        <span class="ring-sub">done</span>
      </div>
    </div>
    <div class="progress-info">
      <h2>Today's Mission</h2>
      <p>Track your study goals, stay focused, and build consistent habits. Every completed goal is a step toward academic excellence. </p>
    </div>
  </div>

  <!-- Add Goal -->
  <div class="add-section">
    <div class="section-title">New Goal</div>
    <div class="add-row">
      <input type="text" id="goalInput" placeholder="e.g. Complete 3 chapters of calculus..." maxlength="80"/>
      <select id="typeSelect">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
      </select>
      <select id="prioritySelect">
        <option value="high">🔴 High</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="low">🟢 Low</option>
      </select>
      <button class="btn btn-primary" onclick="addGoal()">+ Add</button>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('daily', this)">Daily</button>
    <button class="filter-btn" onclick="setFilter('weekly', this)">Weekly</button>
    <button class="filter-btn" onclick="setFilter('monthly', this)">Monthly</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Completed</button>
  </div>

  <!-- Goals -->
  <div class="goals-list" id="goalsList"></div>
</div>

<script>
  // Date
  const datechip = document.getElementById('datechip');
  datechip.textContent = new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric'});

  let goals = JSON.parse(localStorage.getItem('studyGoals') || '[]');
  let filter = 'all';

  const defaultGoals = [
    { id: 1, title: 'Review lecture notes for all subjects', type: 'daily', priority: 'high', done: false },
    { id: 2, title: 'Solve 10 practice problems in math', type: 'daily', priority: 'medium', done: false },
    { id: 3, title: 'Read 20 pages of assigned textbook', type: 'daily', priority: 'medium', done: true },
    { id: 4, title: 'Complete assignment draft for English essay', type: 'weekly', priority: 'high', done: false },
    { id: 5, title: 'Study group session for physics exam', type: 'weekly', priority: 'medium', done: false },
    { id: 6, title: 'Finish all modules in online course', type: 'monthly', priority: 'low', done: false },
  ];

  if (goals.length === 0) {
    goals = defaultGoals;
    save();
  }

  function save() {
    localStorage.setItem('studyGoals', JSON.stringify(goals));
  }

  function addGoal() {
    const input = document.getElementById('goalInput');
    const title = input.value.trim();
    if (!title) { input.focus(); input.style.borderColor='var(--red)'; setTimeout(()=>input.style.borderColor='',600); return; }
    goals.unshift({
      id: Date.now(),
      title,
      type: document.getElementById('typeSelect').value,
      priority: document.getElementById('prioritySelect').value,
      done: false
    });
    input.value = '';
    save();
    render();
  }

  document.getElementById('goalInput').addEventListener('keydown', e => { if(e.key==='Enter') addGoal(); });

  function toggleDone(id) {
    const g = goals.find(g => g.id === id);
    if (g) { g.done = !g.done; save(); render(); }
  }

  function deleteGoal(id) {
    goals = goals.filter(g => g.id !== id);
    save();
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function updateStats() {
    const total = goals.length;
    const done = goals.filter(g => g.done).length;
    const pending = total - done;
    const pct = total ? Math.round(done / total * 100) : 0;

    document.getElementById('totalCount').textContent = total;
    document.getElementById('doneCount').textContent = done;
    document.getElementById('pendingCount').textContent = pending;
    document.getElementById('ringPct').textContent = pct + '%';

    const circumference = 251.2;
    const offset = circumference - (pct / 100) * circumference;
    document.getElementById('ringProgress').style.strokeDashoffset = offset;
  }

  function render() {
    updateStats();
    let filtered = goals;
    if (filter === 'done') filtered = goals.filter(g => g.done);
    else if (filter === 'pending') filtered = goals.filter(g => !g.done);
    else if (filter !== 'all') filtered = goals.filter(g => g.type === filter);

    const list = document.getElementById('goalsList');
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><span class="emoji">📚</span>No goals here yet.<br>Add a new goal above to get started!</div>`;
      return;
    }

    list.innerHTML = filtered.map(g => `
      <div class="goal-item ${g.done ? 'done' : ''}" id="goal-${g.id}">
        <button class="check-btn" onclick="toggleDone(${g.id})">✓</button>
        <div class="goal-body">
          <div class="goal-title">${escapeHtml(g.title)}</div>
          <div class="goal-meta">
            <span class="tag ${g.type}">${g.type}</span>
            <span class="priority-dot ${g.priority}"></span>
            <span class="priority-label">${g.priority} priority</span>
          </div>
        </div>
        <button class="delete-btn" onclick="event.stopPropagation();deleteGoal(${g.id})">✕</button>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }

  render();
</script>
</body>
</html>
